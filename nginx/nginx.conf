# Единая точка входа (prod): один домен — WebApp + Django API.
# SSL: терминация на балансировщике (X-Forwarded-Proto) или здесь (раскомментировать server 443).

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Лимиты запросов (защита от флуда)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Буферы для прокси
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    client_max_body_size 10M;
    client_body_buffer_size 128k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/html
        application/json
        application/javascript
        application/x-javascript
        text/css
        text/plain
        text/javascript
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default "";
        "~*upgrade" "upgrade";
    }

    # Реальный IP клиента за прокси/балансировщиком (для limit_req)
    # За прокси/балансировщиком: раскомментировать и указать доверенные IP.
    # set_real_ip_from 10.0.0.0/8;
    # set_real_ip_from 172.16.0.0/12;
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    map $http_x_forwarded_for $real_client_ip {
        default $remote_addr;
        "~^(?<first>[^,]+)" $first;
    }

    upstream backend {
        server backend:8000 max_fails=0;
        keepalive 32;
    }

    upstream webapp {
        server webapp:3000 max_fails=0;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /var/www;

        # Ограничение соединений на один IP
        limit_conn conn_limit 30;

        # Заголовки безопасности
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # API: лимит запросов, передача initData в бэкенд
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
            proxy_set_header Connection "";
        }

        # Админка: строже лимит
        location /admin/ {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header Connection "";
        }

        # Файлы с диска: Telegram и клиенты качают по публичному URL без gunicorn (меньше 502).
        location /media/ {
            alias /var/www/media/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /static/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location / {
            default_type text/html;
            proxy_pass http://webapp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_cache_bypass $http_upgrade;
            # Повторная попытка при временной недоступности webapp (перезапуск контейнера)
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;
        }
    }

    # Раскомментировать при терминации SSL в nginx (Let's Encrypt и т.п.):
    # server {
    #     listen 443 ssl http2 default_server;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ... (скопировать location-блоки из server 80 и add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;)
    # }
    # server { listen 80; server_name _; return 301 https://$host$request_uri; }
}
