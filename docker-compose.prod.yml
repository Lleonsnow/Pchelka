# Production: единая точка входа через nginx (TLS), образы без монтирования кода.
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
# В .env: NGINX_SERVER_NAME, TELEGRAM_WEBAPP_HOST=https://..., MEDIA_BASE_URL=https://..., ALLOWED_HOSTS с доменом.
# Первый запуск без сертификатов: up -d db backend webapp bot → ./scripts/certbot-standalone.sh → up -d nginx
# (скрипт: set -a && source .env && set +a)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    image: tg-shop-backend:prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --worker-tmp-dir /dev/shm"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: ./bot
    image: tg-shop-bot:prod
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}
    image: tg-shop-webapp:prod
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build: ./nginx
    image: tg-shop-nginx:prod
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME}
      SSL_LETSENCRYPT_HOST: ${SSL_LETSENCRYPT_HOST:-}
    volumes:
      - ./nginx/nginx.prod.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - backend
      - webapp
    restart: unless-stopped

  # Выпуск/продление: docker compose -f docker-compose.prod.yml --profile certbot run --rm certbot ...
  certbot:
    image: certbot/certbot:v2.11.0
    profiles:
      - certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot-webroot:/var/www/certbot

volumes:
  postgres_data:
  backend_media:
  backend_static:
  backend_logs:
