services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tgshop}
      POSTGRES_USER: ${POSTGRES_USER:-tgshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgshop} -d ${POSTGRES_DB:-tgshop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tgshop}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgshop}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: ./bot
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tgshop}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tgshop}
    volumes:
      - ./bot:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
