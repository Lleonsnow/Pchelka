{# Лёгкие частицы на фоне входа (без размытого полноэкранного слоя — он давал «огромный прямоугольник»). #}
<style id="admin-login-ambient-styles">
  #admin-login-particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
</style>
<script>
(function () {
  function init() {
    if (!document.body.classList.contains("login")) return;
    var canvas = document.createElement("canvas");
    canvas.id = "admin-login-particles";
    canvas.setAttribute("aria-hidden", "true");
    var skip = document.body.querySelector('a[href="#content-start"]');
    if (skip && skip.parentNode) {
      skip.parentNode.insertBefore(canvas, skip.nextSibling);
    } else {
      document.body.insertBefore(canvas, document.body.firstChild);
    }
    var ctx = canvas.getContext("2d");
    var particles = [];
    var density = 40;
    function resize() {
      var dpr = window.devicePixelRatio || 1;
      var w = window.innerWidth;
      var h = window.innerHeight;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function spawn() {
      particles = [];
      var w = window.innerWidth;
      var h = window.innerHeight;
      for (var i = 0; i < density; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          radius: Math.random() * 1.4 + 0.6,
          vx: (Math.random() - 0.5) * 0.45,
          vy: (Math.random() - 0.5) * 0.45,
          opacity: Math.random() * 0.35 + 0.12
        });
      }
    }
    function tick() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.shadowBlur = 0;
      for (var j = 0; j < particles.length; j++) {
        var p = particles[j];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 236, 180, " + p.opacity + ")";
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        if (p.x <= 0 || p.x >= w) p.vx *= -1;
        if (p.y <= 0 || p.y >= h) p.vy *= -1;
      }
      requestAnimationFrame(tick);
    }
    resize();
    spawn();
    tick();
    window.addEventListener("resize", function () {
      resize();
      spawn();
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
